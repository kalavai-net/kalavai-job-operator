apiVersion: kalavai.net/v1
kind: KalavaiJob
metadata:
  name: job-controller
spec:
  template:
    chart: personaplex # <-- name of the template to deploy
    version: "0.0.7"
    repo: kalavai-template
    values:
      hf_token: ""
      ingress:
        enabled: false
        subdomain: spaces.kalavai.net
  priorityClassName: user-spot-priority # <-- priority for the deployment
